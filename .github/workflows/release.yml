name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # required to create GitHub Releases and upload assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for accurate tag detection

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY="aws-s3-cost-explorer-${{ matrix.suffix }}${{ matrix.ext }}"
          go build -v \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "$BINARY" \
            .
          echo "BINARY=$BINARY" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha256sum "$BINARY" > "$BINARY.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY }}
            ${{ env.BINARY }}.sha256
          generate_release_notes: true
